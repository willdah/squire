[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-risk-engine"
version = "0.1.0"
description = "Layered risk evaluation for AI agent tool execution."
authors = [{name = "Will Ahern"}]
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8", "pytest-asyncio>=0.25"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_risk_engine"]
