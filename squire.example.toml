# Squire — Example Configuration
#
# Copy this file to one of:
#   ./squire.toml              (project directory — highest priority)
#   ~/.config/squire/squire.toml (user config)
#   /etc/squire/squire.toml      (system-wide)
#
# Environment variables (SQUIRE_*) take precedence over TOML values.
# Values shown here are the defaults.

# --- Top-level application settings ---
# app_name = "Squire"
# user_id = "squire-user"
# house = ""                       # Your house name (e.g. "Ahern", "Stark", "Homestead")
# squire_profile = ""              # Pre-configured profile: "rook", "cedric", "wynn"
# squire_name = ""                 # Custom name (overrides profile name if set)
# risk_tolerance = "cautious"      # 1-5 or alias: read-only(1), cautious(2), standard(3), full-trust(5)
# risk_strict = false              # true = deny above threshold; false = prompt for approval
# history_limit = 50               # Max messages in conversation context
# max_tool_rounds = 10             # Max tool-call rounds per user message

# --- LLM provider ---
[llm]
# model = "ollama_chat/llama3.1:8b"
# api_base = "http://localhost:11434"
# temperature = 0.2
# max_tokens = 4096

# --- Database persistence ---
[db]
# path = "~/.local/share/squire/squire.db"
# snapshot_interval_minutes = 15

# --- Guardrails: tool overrides, command/path guards, per-agent tolerances ---
[guardrails]
# tools_allow = ["docker_logs"]            # bypass risk check, auto-run
# tools_require_approval = ["docker_compose"]  # always ask user first
# tools_deny = ["run_command"]             # hard block, never run

# Per-agent tolerance overrides (only relevant when multi_agent = true)
# monitor_tolerance = "standard"
# container_tolerance = "cautious"
# admin_tolerance = "read-only"
# notifier_tolerance = "cautious"

# run_command argument guards
# commands_allow = [
#     "ping", "traceroute", "dig", "nslookup",
#     "df", "free", "uptime", "ip", "ss",
#     "cat", "head", "tail",
# ]
# commands_block = [
#     "rm", "mkfs", "dd", "fdisk", "parted",
#     "shutdown", "reboot", "init",
#     "bash", "sh", "zsh", "fish", "csh", "tcsh", "dash",
#     "python", "python3", "perl", "ruby", "node", "lua",
# ]

# read_config path guards
# config_paths = ["/etc/nginx/", "/opt/stacks/"]

# Watch-mode risk overrides
[guardrails.watch]
# tolerance = "read-only"            # overrides global risk_tolerance for watch
# tools_allow = []                   # additional tools to auto-allow in watch
# tools_deny = []                    # additional tools to deny in watch

# --- Skills (file-based, Open Agent Skills spec) ---
[skills]
# path = "~/.local/share/squire/skills"  # Directory containing NAME/SKILL.md subdirectories

# --- Watch mode (operational settings only — risk policy is in [guardrails.watch]) ---
[watch]
# interval_minutes = 5
# max_tool_calls_per_cycle = 15
# cycle_timeout_seconds = 300
# cycles_per_session = 50
# notify_on_action = true
# notify_on_blocked = true

# --- Remote hosts (multi-machine management) ---
# Define remote hosts that Squire can connect to via SSH.
# Each tool accepts an optional `host` parameter to target a specific machine.
#
# [[hosts]]
# name = "media-server"
# address = "192.168.1.10"
# user = "will"
# # port = 22                        # SSH port (default 22)
# # key_file = "~/.ssh/id_ed25519"   # SSH key (uses ssh-agent if omitted)
# # tags = ["media", "docker"]       # Optional tags for grouping
#
# [[hosts]]
# name = "nas"
# address = "192.168.1.20"
# user = "will"
# port = 2222

# --- Notifications ---
[notifications]
# enabled = false
#
# [[notifications.webhooks]]
# name = "discord"
# url = "https://discord.com/api/webhooks/..."
# events = ["error", "approval_denied"]
# headers = {}
#
# [[notifications.webhooks]]
# name = "ntfy"
# url = "https://ntfy.sh/squire-alerts"
# events = ["*"]
